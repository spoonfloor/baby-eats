<!-- App Bar Shell (single shared markup for list + editor) -->

<div class="app-bar-wrapper no-select">
  <!-- Centered search bar layer (list mode only) -->
  <div class="app-bar-search-layer" id="appBarSearchLayer">
    <div class="search-bar">
      <input type="text" placeholder="Search" id="appBarSearchInput" />
      <span class="clear-search" id="appBarSearchClear">&times;</span>
    </div>
  </div>

  <div class="app-bar-elements-layer">
    <div class="title-and-back">
      <!-- LEFT: list = menu, editor = back -->
      <button class="app-bar-icon-button" id="appBarMenuBtn" aria-label="Menu">
        <img src="assets/menu_light.svg" alt="Menu" class="app-bar-icon" />
      </button>

      <button class="app-bar-icon-button" id="appBarBackBtn" aria-label="Back">
        <svg
          class="back-arrow"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M15 18L9 12L15 6"
            stroke="white"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
      <span class="title title-editor" id="appBarTitle"></span>
    </div>

    <div class="actions">
      <!-- RIGHT: list = Add, editor = Cancel / Save -->
      <button class="button" id="appBarAddBtn">Add</button>

      <button id="appBarCancelBtn">Cancel</button>
      <button id="appBarSaveBtn">Save</button>
    </div>
  </div>
</div>
