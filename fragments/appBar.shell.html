<!-- App Bar Shell (single shared markup for list + editor) -->

<div class="app-bar-wrapper no-select">
  <div class="app-bar-elements-layer">
    <div class="title-and-back">
      <!-- LEFT: list = menu, editor = back -->
      <button class="app-bar-icon-button" id="appBarMenuBtn" aria-label="Menu">
        <img src="assets/menu_light.svg" alt="Menu" class="app-bar-icon" />
      </button>

      <button class="app-bar-icon-button" id="appBarBackBtn" aria-label="Back">
        <img
          src="assets/back_arrow_light.svg"
          alt="Back"
          class="app-bar-icon"
        />
      </button>
      <span class="title title-editor" id="appBarTitle"></span>
    </div>

    <!-- CENTER: search bar (list mode only) -->
    <div class="app-bar-search-layer" id="appBarSearchLayer">
      <div class="search-bar">
        <input type="text" placeholder="Search" id="appBarSearchInput" />
        <button
          class="clear-search"
          id="appBarSearchClear"
          type="button"
          aria-label="Clear search"
        >
          &times;
        </button>
      </div>
    </div>

    <div class="actions">
      <!-- RIGHT: list = Add, editor = Cancel / Save -->
      <button
        class="button app-bar-search-toggle app-bar-action-icon-only"
        id="appBarSearchToggleBtn"
        type="button"
        aria-label="Search"
        aria-controls="appBarSearchLayer"
        aria-expanded="false"
      >
        <span
          class="material-symbols-outlined app-bar-action-icon app-bar-icon-font"
          aria-hidden="true"
          >search</span
        >
      </button>
      <button class="button" id="appBarAddBtn">Add</button>

      <button class="button" id="appBarCancelBtn">Cancel</button>
      <button class="button" id="appBarSaveBtn">Save</button>
    </div>
  </div>
</div>
