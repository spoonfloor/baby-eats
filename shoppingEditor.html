<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;"
    />
    <title>Favorite Eats - Shopping Item</title>

    <!-- Load Red Hat Mono font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Mono&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/overrides.css" />
    <link rel="stylesheet" href="css/styles.css" />

    <!-- ✅ Local SQL.js (offline) -->
    <script src="js/sql-wasm.js"></script>
  </head>

  <body class="shopping-editor-page" data-page="shopping-editor">
    <!-- Shared App Bar v1 (additive) -->
    <div class="app-bar">
      <button class="back" id="appBarBackBtn">←</button>
      <h1 class="title" id="appBarTitle"></h1>
      <div class="actions">
        <button id="appBarCancelBtn">Cancel</button>
        <button id="appBarSaveBtn">Save</button>
      </div>
    </div>

    <div class="app-bar-wrapper no-select">
      <!-- Left/Right elements layer -->
      <div class="app-bar-elements-layer">
        <div class="title-and-back">
          <div class="back-button" id="shoppingBackButton">
            <img
              src="assets/back_arrow_light.svg"
              alt="Back"
              class="back-arrow"
            />
          </div>
          <!-- removed: title in app bar -->
          <!-- Title removed from app bar; moved to body -->
        </div>
        <div class="actions">
          <button class="button" id="shoppingCancelBtn">Cancel</button>
          <button class="button" id="shoppingSaveBtn">Save</button>
        </div>
      </div>
    </div>

    <main class="page-main">
      <div class="page-wrapper editor-page">
        <div id="pageContent" class="page-content"></div>
      </div>
    </main>

    <!-- JS Modules -->
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
