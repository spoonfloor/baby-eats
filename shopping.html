<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;"
    />
    <title>Favorite Eats - Shopping</title>

    <!-- Load Red Hat Mono font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Mono&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/overrides.css" />
    <link rel="stylesheet" href="css/styles.css" />

    <!-- ✅ Local SQL.js (offline) -->
    <script src="js/sql-wasm.js"></script>
  </head>

  <body class="shopping-page">
    <!-- Shared App Bar v1 (additive) -->
    <div class="app-bar">
      <button class="back" id="appBarBackBtn">←</button>
      <h1 class="title" id="appBarTitle"></h1>
      <div class="actions"></div>
    </div>

    <div class="app-bar-wrapper no-select">
      <!-- Centered search bar layer -->
      <div class="app-bar-search-layer">
        <div class="search-bar">
          <input type="text" placeholder="Search" id="shoppingSearch" />
          <span class="clear-search">&times;</span>
        </div>
      </div>

      <!-- Left/Right elements layer -->
      <div class="app-bar-elements-layer">
        <div class="title-and-back">
          <button class="app-bar-icon-button" id="menuButton" aria-label="Menu">
            <img src="assets/menu_light.svg" alt="Menu" class="app-bar-icon" />
          </button>
          <span class="title title-recipes">Shopping</span>
        </div>

        <div class="actions">
          <button class="button" id="shoppingActionBtn">Add</button>
        </div>
      </div>
    </div>

    <main class="page-main">
      <div class="page-wrapper">
        <ul id="shoppingList" class="list-view list-page"></ul>
      </div>
    </main>
    <nav class="bottom-nav no-select" aria-label="Primary">
      <div class="bottom-nav-pill-row">
        <button class="bottom-nav-pill" data-tab="recipes" type="button">
          Recipes
        </button>
        <button
          class="bottom-nav-pill bottom-nav-pill--active"
          data-tab="shopping"
          type="button"
        >
          Shopping
        </button>
        <button class="bottom-nav-pill" data-tab="units" type="button">
          Units
        </button>
        <button class="bottom-nav-pill" data-tab="stores" type="button">
          Stores
        </button>
      </div>
    </nav>

    <!-- JS Modules -->
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
