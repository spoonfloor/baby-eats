<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;"
    />
    <title>Favorite Eats</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/overrides.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/overlays.css" />
  </head>
  <body class="welcome-page" data-page="welcome">
    <div class="centered-container">
      <div class="welcome-card">
        <h1 class="nav-text">Favorite Eats!</h1>
        <button id="loadDbBtn" class="button nav-text">Load Recipes</button>
        <p id="welcomeStatus" class="nav-text welcome-card__body" hidden></p>
        <input
          type="file"
          id="dbLoader"
          accept=".db"
          class="file-input-hidden"
        />
      </div>
    </div>

    <script src="js/welcome.js"></script>
  </body>
</html>
