<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;"
    />
    <title>Favorite Eats - Recipes</title>

    <!-- Load Red Hat Mono font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Mono&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/overrides.css" />
    <link rel="stylesheet" href="css/styles.css" />

    <!-- ✅ Local SQL.js (offline) -->
    <script src="js/sql-wasm.js"></script>
  </head>

  <body class="recipes-page" data-page="recipes">
    <div id="appBarMount"></div>

    <main class="page-main">
      <div class="page-wrapper">
        <ul id="recipeList" class="list-view list-page"></ul>
      </div>
    </main>
    <!-- Add Recipe Modal -->
    <div id="addRecipeModal" class="modal hidden">
      <div class="modal-content">
        <h2>New Recipe</h2>
        <label class="modal-field">
          <span>Title</span>
          <input id="newRecipeTitle" type="text" />
        </label>
        <div class="modal-actions">
          <button class="button" id="addRecipeCancel">Cancel</button>
          <button class="button" id="addRecipeCreate">Create</button>
        </div>
      </div>
    </div>

    <!-- Delete Recipe Modal -->
    <div id="deleteRecipeModal" class="modal hidden">
      <div class="modal-content">
        <p>Delete '<span id="deleteRecipeTitle"></span>'?</p>
        <div class="modal-actions">
          <button class="button" id="deleteRecipeCancel">Cancel</button>
          <button class="button" id="deleteRecipeConfirm">Delete</button>
        </div>
      </div>
    </div>

    <nav class="bottom-nav no-select" aria-label="Primary">
      <div class="bottom-nav-pill-row">
        <button
          class="bottom-nav-pill bottom-nav-pill--active"
          data-tab="recipes"
          type="button"
        >
          Recipes
        </button>
        <button class="bottom-nav-pill" data-tab="shopping" type="button">
          Shopping
        </button>
        <button class="bottom-nav-pill" data-tab="units" type="button">
          Units
        </button>
        <button class="bottom-nav-pill" data-tab="stores" type="button">
          Stores
        </button>
      </div>
    </nav>

    <!-- JS Modules -->
    <script src="js/utils.js"></script>
    <script src="js/ingredientRenderer.js"></script>
    <script src="js/recipeEditor.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
